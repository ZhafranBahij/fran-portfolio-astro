# ============================================================
# Docker Compose for Astro.js Portfolio
# ============================================================
# Usage:
#   Development: docker compose --profile dev up
#   Production:  docker compose --profile prod up
# ============================================================

name: fran-portfolio

services:
  # ============================================================
  # DEVELOPMENT SERVICE
  # Hot-reload enabled for local development
  # Usage: docker compose --profile dev up
  # ============================================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: fran-portfolio-dev
    profiles:
      - dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.astro
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=4321
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    networks:
      - dev-network
    tty: true
    stdin_open: true

  # ============================================================
  # PRODUCTION SERVICE
  # Builds and runs inside Docker
  # Usage: docker compose --profile prod up
  # ============================================================
  prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: fran-portfolio-prod
    profiles:
      - prod
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================
# NETWORKS
# ============================================================
networks:
  dev-network:
    driver: bridge
  prod-network:
    driver: bridge
